<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Calculator</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 1px;
            padding: 1px;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1185eb, #a4642f, #ff3b30, #c78734);
        }

        .calculator {
            width: 100%;
            max-width: 350px;
            background: #18121a;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(52, 7, 255, 0.3);
        }

        .display {
            width: 100%;
            height: 60px;
            background: #bc4949;
            color: rgb(78, 20, 251);
            font-size: 1.8rem;
            text-align: right;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .operator {
            background: #ff9500;
            color: white;
        }

        .equal {
            background: #c78734;
            color: white;
            grid-column: span 2;
        }

        .clear {
            background: #ff3b30;
            color: white, #ff3b30;
           
        }

        .number {
            background: #333;
            color: white;
        }

        @media (max-width: 400px) {
            .calculator {
                padding: 15px;
            }

            button {
                padding: 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('**')">x²</button>
        

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('/100')">%</button>


        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(value) {
        if (display.innerText === "0") {
            display.innerText = value;
        } else {
            display.innerText += value;
        }
    }

    function clearDisplay() {
        display.innerText = "0";
    }

    function calculate() {
        try {
            display.innerText = eval(display.innerText);
        } catch {
            display.innerText = "Error";
        }
    }
</script>

</body>
</html>
